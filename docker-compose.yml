version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: splitbite-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: splitbite-server
    ports:
      - "9000:9000"
    environment:
      - REDIS_URL=redis://redis:6379
      - APPLICATION_SECRET=my-application-secret-change-in-prod
    depends_on:
      - redis
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: splitbite-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: always

volumes:
  redis_data:
