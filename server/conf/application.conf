play.modules.enabled += "modules.ActorModule"

play.filters.enabled += "play.filters.cors.CORSFilter"

play.filters.cors {
  allowedOrigins = null
  allowedHttpMethods = null
  allowedHttpHeaders = null
  preflightMaxAge = 3 days
}

play.filters.hosts {
  allowed = ["."]
}

# WebSocket frame size — must handle base64 images (1MB file = ~1.4MB base64)
# Also must handle the full room state broadcast which includes embedded images
play.server.websocket.frame.maxLength = 4m
# Room Management
splitbite.room.max_count = 10
splitbite.room.ttl = 10h
